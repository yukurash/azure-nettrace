name: lint

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            #node_modules

  mermaid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli
      - name: Validate Mermaid code blocks
        run: |
          # Extract every ```mermaid block from tracked markdown and dry-run compile it.
          mkdir -p .mmd
          count=0
          fail=0
          while IFS= read -r -d '' f; do
            base=$(echo "$f" | tr '/.' '__')
            awk -v pfx=".mmd/${base}" '
              /^```mermaid$/ {flag=1; n++; out=pfx"_"n".mmd"; next}
              /^```/ {flag=0; next}
              flag {print > out}
            ' "$f"
          done < <(find . -name '*.md' -not -path './node_modules/*' -not -path './.mmd/*' -print0)
          for m in .mmd/*.mmd; do
            [ -e "$m" ] || continue
            count=$((count+1))
            if ! mmdc -i "$m" -o "${m}.svg" >/dev/null 2>err.txt; then
              echo "::error::Mermaid parse error in $m"; cat err.txt; fail=1
            fi
          done
          echo "Validated $count Mermaid block(s)."
          rm -rf .mmd err.txt
          exit $fail
